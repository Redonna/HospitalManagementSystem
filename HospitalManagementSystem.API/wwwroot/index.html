<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hospital Management System — Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <style>
    body {
      background: linear-gradient(135deg, #0d3b66 0%, #1a6ea8 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }
    .login-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
    }
    .logo-circle {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #0d3b66, #1a6ea8);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
    }
    .logo-circle i { font-size: 36px; color: #fff; }
    h2 { color: #0d3b66; font-weight: 700; }
    .subtitle { color: #6c757d; font-size: 0.9rem; }
    .btn-primary {
      background: linear-gradient(135deg, #0d3b66, #1a6ea8);
      border: none;
      padding: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .btn-primary:hover { opacity: 0.9; }
    .form-control:focus { border-color: #1a6ea8; box-shadow: 0 0 0 0.2rem rgba(26,110,168,0.25); }
    .form-label { color: #0d3b66; font-weight: 500; }
    #errorMsg { display: none; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo-circle">
      <i class="bi bi-hospital"></i>
    </div>
    <h2 class="text-center mb-1">MediCare HMS</h2>
    <p class="subtitle text-center mb-4">Hospital Management System</p>

    <div class="alert alert-danger" id="errorMsg" role="alert">
      <i class="bi bi-exclamation-triangle-fill me-2"></i>
      Invalid username or password.
    </div>

    <form id="loginForm">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" class="form-control" id="username" placeholder="Enter username" required/>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" class="form-control" id="password" placeholder="Enter password" required/>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100">
        <span id="btnText"><i class="bi bi-box-arrow-in-right me-2"></i>Sign In</span>
        <span id="btnSpinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
      </button>
    </form>

    <p class="text-center text-muted mt-4 mb-0" style="font-size:0.8rem;">
      South East European University &bull; SOA Final Project 2026
    </p>
  </div>

  <script>
    const API = window.location.hostname === 'localhost' ? 'https://localhost:56075/api' : '`${window.location.origin}/api';

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btnText');
      const spinner = document.getElementById('btnSpinner');
      const errorMsg = document.getElementById('errorMsg');

      btn.classList.add('d-none');
      spinner.classList.remove('d-none');
      errorMsg.style.display = 'none';

      try {
        const res = await fetch(`${API}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
          })
        });

        if (res.ok) {
          const data = await res.json();
          localStorage.setItem('token', data.token);
          localStorage.setItem('username', data.username);
          localStorage.setItem('role', data.role);
          if (data.profileId) localStorage.setItem('profileId', data.profileId);
          else localStorage.removeItem('profileId');
          window.location.href = 'dashboard.html';
        } else {
          const msg = await res.text();
          errorMsg.querySelector('span')
            ? (errorMsg.querySelector('span').textContent = msg || 'Invalid username or password.')
            : (errorMsg.innerHTML = `<i class="bi bi-exclamation-triangle-fill me-2"></i>${msg || 'Invalid username or password.'}`);
          errorMsg.style.display = 'block';
        }
      } catch {
        errorMsg.textContent = 'Cannot connect to server. Make sure the API is running.';
        errorMsg.style.display = 'block';
      } finally {
        btn.classList.remove('d-none');
        spinner.classList.add('d-none');
      }
    });
  </script>
</body>
</html>
